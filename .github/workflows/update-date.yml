name: Update GitHub Stats and Date

on:
  schedule:
    - cron: '0 * * * *'
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-svg:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Update SVG File
        run: |
          export TZ="Asia/Riyadh"
          CURRENT_DATE=$(date +"%a %b %d %H:%M:%S KSA %Y")
          
          REPOS="12"
          COMMITS="482"
          
          REPOS_REQ=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/users/${{ github.repository_owner }}")
          REPOS_VAL=$(echo "$REPOS_REQ" | jq -r '.public_repos // empty')
          if [ ! -z "$REPOS_VAL" ] && [ "$REPOS_VAL" != "null" ]; then
            REPOS="$REPOS_VAL"
          fi
          
          COMMITS_REQ=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" -H "Accept: application/vnd.github.cloak-preview" "https://api.github.com/search/commits?q=author:${{ github.repository_owner }}")
          COMMITS_VAL=$(echo "$COMMITS_REQ" | jq -r '.total_count // empty')
          if [ ! -z "$COMMITS_VAL" ] && [ "$COMMITS_VAL" != "null" ]; then
            COMMITS="$COMMITS_VAL"
          fi
          
          sed -i "s/TODAY_DATE/$CURRENT_DATE/g" neofetch-info.svg
          sed -i "s/REPO_COUNT/$REPOS/g" neofetch-info.svg
          sed -i "s/COMMIT_COUNT/$COMMITS/g" neofetch-info.svg

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add neofetch-info.svg
          git diff-index --quiet HEAD || git commit -m "⏱️ Auto-update GitHub Stats and Date [Skip CI]"
          git push
