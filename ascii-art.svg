<svg fill="none" viewBox="0 0 400 400" width="400" height="400" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        /* ستايل نافذة الـ Terminal */
        .terminal {
          background-color: #0d1117;
          border: 1px solid #30363d;
          border-radius: 6px;
          padding: 15px;
          font-family: monospace;
          color: #c9d1d9;
          height: 350px;
        }
        /* تأثير النقاط الحمراء والخضراء للـ Mac */
        .buttons span {
          display: inline-block;
          width: 9px;
          height: 9px;
          border-radius: 50%;
          margin-right: 4px;
        }
        /* حركة ظهور الأسطر بالتتابع */
        @keyframes draw {
          from { height: 0; }
          to { height: 100%; }
        }
        .ascii-content {
          overflow: hidden;
          animation: draw 3s steps(40) forwards;
          white-space: pre;
          font-size: 8px;
          line-height: 1.1;
        }
      </style>

      <div class="terminal">
        <div class="buttons" style="margin-bottom: 10px;">
          <span style="background: #ff5f56;"></span>
          <span style="background: #ffbd2e;"></span>
          <span style="background: #27c93f;"></span>
        </div>
        <!-- ضع هنا رسمة الـ ASCII الخاصة بك داخل ديف الحركة -->
        <div class="ascii-content">
############################################################
############################################################
############################*=-.....:=*#####################
###################+-.                     .-###############
#############-.                           ..:-+#############
########=.                      ..:+-=*#==*=#.-=-+##########
