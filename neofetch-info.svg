<svg fill="none" viewBox="0 0 400 360" width="400" height="360" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        /* ستايل نافذة الـ Terminal المحكم */
        .terminal {
          background-color: #0d1117;
          border: 1px solid #30363d;
          border-radius: 6px;
          padding: 12px;
          font-family: monospace;
          color: #c9d1d9;
          height: 330px;
          box-sizing: border-box;
          overflow: hidden;
        }
        
        /* أزرار واجهة الماك */
        .buttons span {
          display: inline-block;
          width: 8px;
          height: 8px;
          border-radius: 50%;
          margin-right: 4px;
        }

        /* ستايل الأسطر العادية لتقليل الفراغات العمودية وتصغير الخط */
        .line {
          display: block;
          white-space: nowrap;
          overflow: hidden;
          width: 0;
          font-size: 11px;
          line-height: 1.2;
          margin-bottom: 3px;
          animation: type-line 0.8s steps(40, end) forwards;
        }

        /* ستايل خاص بشريط التحميل لكي يختفي بعد فترة */
        .loading-line {
          display: block;
          white-space: nowrap;
          overflow: hidden;
          width: 0;
          font-size: 11px;
          line-height: 1.2;
          margin-top: 6px;
          /* أنيميشن الكتابة، ثم أنيميشن الاختفاء المفاجئ بعد 4 ثوانٍ من ظهوره */
          animation: type-line 0.8s steps(40, end) 4.1s forwards, fade-out 0s linear 8.1s forwards;
        }

        /* ستايل الأسطر النهائية التي ستظهر بعد اختفاء التحميل */
        .post-load {
          display: block;
          white-space: nowrap;
          overflow: hidden;
          width: 0;
          font-size: 11px;
          line-height: 1.2;
          margin-bottom: 3px;
          animation: type-line 0.8s steps(40, end) forwards;
        }

        /* تأخير ظهور الأسطر الأساسية بالتتابع السريع */
        .l1 { animation-delay: 0.1s; }
        .l2 { animation-delay: 0.6s; }
        .l3 { animation-delay: 1.1s; }
        .l4 { animation-delay: 1.6s; }
        .l5 { animation-delay: 2.1s; }
        .l6 { animation-delay: 2.6s; }
        .l7 { animation-delay: 3.1s; }
        .l8 { animation-delay: 3.6s; }

        /* تأخير ظهور الأسطر النهائية لتبدأ بالظهور فوراً بعد اختفاء شريط التحميل عند الثانية 8.1 */
        .l9 { animation-delay: 8.2s; }
        .l10 { animation-delay: 8.8s; }
        .l11 { animation-delay: 9.4s; }

        @keyframes type-line {
          from { width: 0; }
          to { width: 100%; }
        }

        @keyframes fade-out {
          to {
            opacity: 0;
            display: none;
            height: 0;
            margin: 0;
            padding: 0;
          }
        }

        /* مؤشر الكتابة الوامض الأخضر */
        .cursor {
          display: inline-block;
          width: 6px;
          height: 12px;
          background-color: #50fa7b;
          margin-left: 3px;
          animation: blink 0.8s infinite;
          vertical-align: middle;
        }
        @keyframes blink {
          50% { opacity: 0; }
        }

        /* ألوان الثيم */
        .title { color: #58a6ff; font-weight: bold; }
        .key { color: #f1fa8c; font-weight: bold; }
        .value { color: #f8f8f2; }
        .meta-color { color: #8b949e; }
      </style>

      <div class="terminal">
        <div class="buttons" style="margin-bottom: 12px;">
          <span style="background: #ff5f56;"></span>
          <span style="background: #ffbd2e;"></span>
          <span style="background: #27c93f;"></span>
          <span style="color: #8b949e; margin-left: 8px; font-size: 10px;">lusker1@github: ~</span>
        </div>
        
        <span class="line l1"><span class="title">lusker1@github</span></span>
        <span class="line l2">-------------------</span>
        <span class="line l3"><span class="key">Role:</span> <span class="value">Full Stack Developer</span></span>
        <span class="line l4"><span class="key">Location:</span> <span class="value">Riyadh, KSA</span></span>
        <span class="line l5"><span class="key">Stack:</span> <span class="value">Laravel, Vue.js, java</span></span>
        <span class="line l6"><span class="key">IDE:</span> <span class="value">NetBeans / VS Code</span></span>
        <span class="line l7" style="margin-top: 4px; color: #50fa7b;">/* My Highlights */</span>
        <span class="line l8"><span class="value">- Building awesome hardware with ESP32-CAM</span></span>
        
        <span class="loading-line"><span class="value">Loading modules... [██████████░] 90%</span></span>
        
        <span class="post-load l9"><span class="key">Memory:</span> <span class="value">512MB / 16GB (3%)</span></span>
        <span class="post-load l10"><span class="key">Network:</span> <span class="value">Connected [100.0 Mbps]</span></span>

        <span class="post-load l11"><span class="meta-color">Last login: TODAY_DATE</span><span class="cursor"></span></span>      
      </div>
    </div>
  </foreignObject>
</svg>
