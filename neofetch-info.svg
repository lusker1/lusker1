<svg fill="none" viewBox="0 0 400 400" width="400" height="400" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        /* نافذة الـ Terminal المطابقة لليسرى بالملي */
        .terminal {
          background-color: #0d1117;
          border: 1px solid #30363d;
          border-radius: 6px;
          padding: 15px;
          font-family: monospace;
          color: #c9d1d9;
          height: 350px;
        }
        
        /* نقاط الماك الثلاثة */
        .buttons span {
          display: inline-block;
          width: 9px;
          height: 9px;
          border-radius: 50%;
          margin-right: 4px;
        }
        
        /* خطوط الواجهة */
        .neofetch-content {
          font-size: 11px;
          line-height: 1.5;
          margin-top: 10px;
        }
        
        .title { color: #58a6ff; font-weight: bold; }
        .key { color: #f1fa8c; font-weight: bold; }
        .value { color: #f8f8f2; }
        .comment { color: #50fa7b; }
        .meta { color: #8b949e; }
        
        .line {
          clip-path: inset(0 100% 0 0);
          animation: reveal 0.5s steps(40, end) forwards;
        }
        
        .space {
          height: 6px;
          clip-path: none !important;
          animation: none !important;
        }

        @keyframes reveal {
          to { clip-path: inset(0 0 0 0); }
        }
        
        @keyframes fadeOut {
          to { opacity: 0; display: none; height: 0; visibility: hidden; }
        }

        /* توقيت حركة ظهور الأسطر بالتناوب */
        .l1 { animation-delay: 0.1s; }
        .l2 { animation-delay: 0.6s; }
        .l3 { animation-delay: 1.1s; }
        .l4 { animation-delay: 1.6s; }
        .l5 { animation-delay: 2.1s; }
        .l6 { animation-delay: 2.6s; }
        .l7 { animation-delay: 3.1s; }
        .l8 { animation-delay: 3.6s; }
        .l9 { animation-delay: 4.1s; }
        
        .loading-line {
          clip-path: inset(0 100% 0 0);
          animation: reveal 0.5s steps(40, end) 4.6s forwards, fadeOut 0s 7.5s forwards;
        }
        
        .post-load {
          opacity: 0;
          animation: showPostLoad 0s forwards 7.6s;
        }
        @keyframes showPostLoad {
          to { opacity: 1; }
        }
        
        .post-load .line {
          clip-path: inset(0 100% 0 0);
          animation: reveal 0.5s steps(40, end) forwards;
        }
        
        .l10 { animation-delay: 7.7s; }
        .l11 { animation-delay: 8.2s; }
        .l12 { animation-delay: 8.7s; }
        .l13 { animation-delay: 9.2s; }
        .l14 { animation-delay: 9.7s; }

        .cursor {
          display: inline-block;
          width: 6px;
          height: 11px;
          background-color: #50fa7b;
          margin-left: 4px;
          animation: blink 0.8s infinite;
          vertical-align: middle;
        }
        @keyframes blink { 50% { opacity: 0; } }
      </style>

      <div class="terminal">
        <div class="buttons" style="margin-bottom: 10px;">
          <span style="background: #ff5f56;"></span>
          <span style="background: #ffbd2e;"></span>
          <span style="background: #27c93f;"></span>
          <span class="meta" style="font-size: 10px; margin-left: 10px; font-family: monospace; vertical-align: middle;">lusker1@github: ~</span>
        </div>
        
        <div class="neofetch-content">
          <div class="line l1"><span class="title">lusker1@github</span></div>
          <div class="line l2"><span class="meta">-------------------</span></div>
          
          <div class="line l3"><span class="key">Role:</span> <span class="value">Full Stack Developer</span></div>
          <div class="line l4"><span class="key">Location:</span> <span class="value">Riyadh, KSA</span></div>
          <div class="line l5"><span class="key">Stack:</span> <span class="value">Laravel, Vue.js, java</span></div>
          <div class="line l6"><span class="key">IDE:</span> <span class="value">NetBeans / VS Code</span></div>
          
          <div class="space"></div>
          <div class="line l7"><span class="comment">/* My Highlights */</span></div>
          <div class="line l8"><span class="value">- Building awesome hardware with ESP32-CAM</span></div>
          <div class="line l9"><span class="value">- Writing custom automation scripts</span></div>
          
          <div class="space"></div>
          <div class="loading-line"><span class="value">Loading modules... [██████████░] 90%</span></div>
          
          <div class="post-load">
            <div class="line l10"><span class="key">Total Repositories:</span> <span class="value">6</span></div>
            <div class="line l11"><span class="key">Total Commits (2026):</span> <span class="value">464</span></div>
            <div class="space"></div>
            <div class="line l12"><span class="key">Memory:</span> <span class="value">512MB / 16GB (3%)</span></div>
            <div class="line l13"><span class="key">Network:</span> <span class="value">Connected [100.0 Mbps]</span></div>
            <div class="line l14"><span class="meta">Last login: Mon Jul 20 04:22:55 KSA 2026</span><span class="cursor"></span></div>
          </div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
