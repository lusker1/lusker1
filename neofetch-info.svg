<svg fill="none" viewBox="0 0 400 325" width="400" height="325" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill: #0d1117; stroke: #30363d; stroke-width: 1; rx: 6px; }
    .text-base { font-family: monospace; font-size: 10.5px; fill: #c9d1d9; }
    .title { fill: #58a6ff; font-weight: bold; }
    .key { fill: #f1fa8c; font-weight: bold; }
    .value { fill: #f8f8f2; }
    .comment { fill: #50fa7b; }
    .meta { fill: #8b949e; }

    .type-effect {
      clip-path: inset(0 100% 0 0);
      animation: typing 0.5s steps(40, end) forwards;
    }

    @keyframes typing {
      to { clip-path: inset(0 0 0 0); }
    }
    
    @keyframes hideLine {
      to { opacity: 0; min-height: 0; height: 0; display: none; visibility: hidden; }
    }

    .l1 { animation-delay: 0.1s; }
    .l2 { animation-delay: 0.5s; }
    .l3 { animation-delay: 0.9s; }
    .l4 { animation-delay: 1.3s; }
    .l5 { animation-delay: 1.7s; }
    .l6 { animation-delay: 2.1s; }
    .l7 { animation-delay: 2.5s; }
    .l8 { animation-delay: 2.9s; }
    .l9 { animation-delay: 3.3s; }
    
    .loading-line {
      clip-path: inset(0 100% 0 0);
      animation: typing 0.5s steps(40, end) 3.8s forwards, hideLine 0s 6.5s forwards;
    }
    
    .post-load {
      clip-path: inset(0 100% 0 0);
      animation: typing 0.5s steps(40, end) forwards;
    }
    .l10 { animation-delay: 6.6s; }
    .l11 { animation-delay: 7.1s; }
    .l12 { animation-delay: 7.6s; }
    .l13 { animation-delay: 8.1s; }
    .l14 { animation-delay: 8.6s; }

    .cursor { fill: #50fa7b; animation: blink 0.8s infinite; }
    @keyframes blink { 50% { opacity: 0; } }
  </style>

  <rect width="398" height="323" x="1" y="1" class="bg" />

  <circle cx="20" cy="15" r="3.5" fill="#ff5f56" />
  <circle cx="32" cy="15" r="3.5" fill="#ffbd2e" />
  <circle cx="44" cy="15" r="3.5" fill="#27c93f" />
  <text x="60" y="18" class="text-base meta" font-size="9.5">lusker1@github: ~</text>

  <g class="text-base">
    <text x="15" y="42" class="type-effect l1 title">lusker1@github</text>
    <text x="15" y="55" class="type-effect l2">-------------------</text>
    
    <text x="15" y="70" class="type-effect l3"><tspan class="key">Role:</tspan> <tspan class="value">Full Stack Developer</tspan></text>
    <text x="15" y="84" class="type-effect l4"><tspan class="key">Location:</tspan> <tspan class="value">Riyadh, KSA</tspan></text>
    <text x="15" y="98" class="type-effect l5"><tspan class="key">Stack: </tspan> <tspan class="value">Laravel, Vue.js, java</tspan></text>
    <text x="15" y="112" class="type-effect l6"><tspan class="key">IDE:   </tspan> <tspan class="value">NetBeans / VS Code</tspan></text>
    
    <text x="15" y="132" class="type-effect l7 comment">/* My Highlights */</text>
    <text x="15" y="146" class="type-effect l8 value">- Building awesome hardware with ESP32-CAM</text>
    <text x="15" y="160" class="type-effect l9 value">- Writing custom automation scripts</text>
    
    <text x="15" y="182" class="loading-line value">Loading modules... [██████████░] 90%</text>
    
    <text x="15" y="182" class="post-load l10"><tspan class="key">Total Repositories:</tspan> <tspan class="value">REPO_COUNT</tspan></text>
    <text x="15" y="196" class="post-load l11"><tspan class="key">Total Commits (2026):</tspan> <tspan class="value">COMMIT_COUNT</tspan></text>
    
    <text x="15" y="220" class="post-load l12"><tspan class="key">Memory: </tspan> <tspan class="value">512MB / 16GB (3%)</tspan></text>
    <text x="15" y="234" class="post-load l13"><tspan class="key">Network:</tspan> <tspan class="value">Connected [100.0 Mbps]</tspan></text>
    <text x="15" y="248" class="post-load l14 meta">Last login: TODAY_DATE<tspan class="cursor">█</tspan></text>
  </g>
</svg>
