<svg fill="none" viewBox="0 0 400 440" width="400" height="440" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        /* ستايل نافذة الـ Terminal */
        .terminal {
          background-color: #0d1117;
          border: 1px solid #30363d;
          border-radius: 6px;
          padding: 15px;
          font-family: monospace;
          color: #c9d1d9;
          height: 390px;
          overflow: hidden;
          box-sizing: border-box;
        }
        
        .buttons span {
          display: inline-block;
          width: 9px;
          height: 9px;
          border-radius: 50%;
          margin-right: 4px;
        }

        .line {
          display: block;
          white-space: nowrap;
          overflow: hidden;
          width: 0;
          font-size: 13px;
          line-height: 1.6;
          animation: type-line 1s steps(40, end) forwards;
        }

        .l1 { animation-delay: 0.2s; }
        .l2 { animation-delay: 1.2s; }
        .l3 { animation-delay: 2.2s; }
        .l4 { animation-delay: 3.2s; }
        .l5 { animation-delay: 4.2s; }
        .l6 { animation-delay: 5.2s; }
        .l7 { animation-delay: 6.2s; }
        .l8 { animation-delay: 7.2s; }
        .l9 { animation-delay: 8.2s; }

        @keyframes type-line {
          from { width: 0; }
          to { width: 100%; }
        }

        .cursor {
          display: inline-block;
          width: 8px;
          height: 14px;
          background-color: #50fa7b;
          margin-left: 4px;
          animation: blink 0.8s infinite;
          vertical-align: middle;
        }
        @keyframes blink {
          50% { opacity: 0; }
        }

        .title { color: #58a6ff; font-weight: bold; }
        .key { color: #f1fa8c; font-weight: bold; }
        .value { color: #f8f8f2; }
      </style>

      <div class="terminal">
        <div class="buttons" style="margin-bottom: 15px;">
          <span style="background: #ff5f56;"></span>
          <span style="background: #ffbd2e;"></span>
          <span style="background: #27c93f;"></span>
          <span style="color: #8b949e; margin-left: 10px; font-size: 11px;">lusker1@github: ~</span>
        </div>
        
        <span class="line l1"><span class="title">lusker1@github</span></span>
        <span class="line l2">-------------------</span>
        <span class="line l3"><span class="key">Role:</span> <span class="value">Full Stack Developer</span></span>
        <span class="line l4"><span class="key">Location:</span> <span class="value">Riyadh, KSA</span></span>
        <span class="line l5"><span class="key">Stack:</span> <span class="value">Laravel, Vue.js, java</span></span>
        <span class="line l6"><span class="key">IDE:</span> <span class="value">NetBeans / VS Code</span></span>
        <br/>
        <span class="line l7" style="color: #50fa7b;">/* My Highlights */</span>
        <span class="line l8"><span class="value">- Building awesome hardware with ESP32-CAM</span></span>
        <span class="line l9"><span class="value">- Writing custom automation scripts</span><span class="cursor"></span></span>
      </div>
    </div>
  </foreignObject>
</svg>
