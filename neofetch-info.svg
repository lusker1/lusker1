<svg fill="none" viewBox="0 0 400 400" width="400" height="400" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill: #0d1117; stroke: #30363d; stroke-width: 1; rx: 6px; }
    .text-base { font-family: monospace; font-size: 11px; fill: #c9d1d9; }
    .title { fill: #58a6ff; font-weight: bold; }
    .key { fill: #f1fa8c; font-weight: bold; }
    .value { fill: #f8f8f2; }
    .comment { fill: #50fa7b; }
    .meta { fill: #8b949e; }

    .type-effect {
      clip-path: inset(0 100% 0 0);
      animation: typing 0.8s steps(40, end) forwards;
    }

    @keyframes typing {
      to { clip-path: inset(0 0 0 0); }
    }
    
    @keyframes fadeOut {
      to { opacity: 0; visibility: hidden; }
    }

    .l1 { animation-delay: 0.1s; }
    .l2 { animation-delay: 0.7s; }
    .l3 { animation-delay: 1.3s; }
    .l4 { animation-delay: 1.9s; }
    .l5 { animation-delay: 2.5s; }
    .l6 { animation-delay: 3.1s; }
    .l7 { animation-delay: 3.7s; }
    .l8 { animation-delay: 4.3s; }
    .l9 { animation-delay: 4.9s; }
    
    .loading-line {
      clip-path: inset(0 100% 0 0);
      animation: typing 0.8s steps(40, end) 5.5s forwards, fadeOut 0s 9.0s forwards;
    }
    
    .post-load {
      clip-path: inset(0 100% 0 0);
      animation: typing 0.8s steps(40, end) forwards;
    }
    .l10 { animation-delay: 9.1s; }
    .l11 { animation-delay: 9.7s; }
    .l12 { animation-delay: 10.3s; }
    .l13 { animation-delay: 10.9s; }
    .l14 { animation-delay: 11.5s; }

    .cursor { fill: #50fa7b; animation: blink 0.8s infinite; }
    @keyframes blink { 50% { opacity: 0; } }
  </style>

  <rect width="398" height="398" x="1" y="1" class="bg" />

  <circle cx="20" cy="20" r="4" fill="#ff5f56" />
  <circle cx="34" cy="20" r="4" fill="#ffbd2e" />
  <circle cx="48" cy="20" r="4" fill="#27c93f" />
  <text x="65" y="23" class="text-base meta" font-size="10">lusker1@github: ~</text>

  <g class="text-base">
    <text x="15" y="55" class="type-effect l1 title">lusker1@github</text>
    <text x="15" y="72" class="type-effect l2">-------------------</text>
    
    <text x="15" y="90" class="type-effect l3"><tspan class="key">Role:</tspan> <tspan class="value">Full Stack Developer</tspan></text>
    <text x="15" y="108" class="type-effect l4"><tspan class="key">Location:</tspan> <tspan class="value">Riyadh, KSA</tspan></text>
    <text x="15" y="126" class="type-effect l5"><tspan class="key">Stack: </tspan> <tspan class="value">Laravel, Vue.js, java</tspan></text>
    <text x="15" y="144" class="type-effect l6"><tspan class="key">IDE:   </tspan> <tspan class="value">NetBeans / VS Code</tspan></text>
    
    <text x="15" y="170" class="type-effect l7 comment">/* My Highlights */</text>
    <text x="15" y="188" class="type-effect l8 value">- Building awesome hardware with ESP32-CAM</text>
    <text x="15" y="206" class="type-effect l9 value">- Writing custom automation scripts</text>
    
    <text x="15" y="232" class="loading-line value">Loading modules... [██████████░] 90%</text>
    
    <text x="15" y="232" class="post-load l10"><tspan class="key">Total Repositories:</tspan> <tspan class="value">REPO_COUNT</tspan></text>
    <text x="15" y="250" class="post-load l11"><tspan class="key">Total Commits (2026):</tspan> <tspan class="value">COMMIT_COUNT</tspan></text>
    
    <text x="15" y="276" class="post-load l12"><tspan class="key">Memory: </tspan> <tspan class="value">512MB / 16GB (3%)</tspan></text>
    <text x="15" y="294" class="post-load l13"><tspan class="key">Network:</tspan> <tspan class="value">Connected [100.0 Mbps]</tspan></text>
    <text x="15" y="312" class="post-load l14 meta">Last login: TODAY_DATE<tspan class="cursor">█</tspan></text>
  </g>
</svg>
